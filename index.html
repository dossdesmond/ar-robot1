<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Burger AR</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

</head>

<body style="margin:0; background:#000;">

<model-viewer

</model-viewer>

</body>
</html>
